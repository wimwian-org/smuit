name: Release

# Publishes any @smuit/* package whose version is not yet on npm (private
# packages — the root and the playground — are skipped automatically).
#
# Auth: npm Trusted Publishing via OIDC — no long-lived token. The job mints a
# short-lived OIDC token (`id-token: write`) that npm exchanges for publish
# rights, and pnpm rewrites the `workspace:*` deps on publish. This requires
# each package to have a Trusted Publisher configured on npmjs.com pointing at
# this repo + workflow file (`.github/workflows/release.yml`).
#
# Triggers:
#   - push to `master` — the repo's release promotion (master only advances on
#     a release), so a master push publishes whatever was just versioned.
#   - manual dispatch — run it from the Actions tab or `gh workflow run`.

on:
    workflow_dispatch:
    push:
        branches: [master]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            id-token: write # mint the OIDC token for trusted publishing
            contents: read
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.tool-versions'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            # The packages publish their built `dist`, so build it first.
            - name: Build component packages
              run: pnpm package

            # No token: pnpm fetches an OIDC token (and provenance) for trusted
            # publishing, which takes precedence over any static credential.
            - name: Publish to npm (OIDC trusted publishing)
              run: pnpm -r publish --no-git-checks --access public
