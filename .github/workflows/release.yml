name: Release

# Publishes any @wimwian-org/* package whose version is not yet on GitHub
# Packages (private packages — the root and the playground — are skipped).
#
# Registry: GitHub Packages (npm.pkg.github.com). Each package's
# `publishConfig.registry` points there; auth uses the automatic GITHUB_TOKEN
# (no npm 2FA, no long-lived secret). pnpm rewrites the workspace:* deps on
# publish.
#
# Triggers:
#   - push to `master` — the repo's release promotion (master only advances on
#     a release), so a master push publishes whatever was just versioned.
#   - manual dispatch — run it from the Actions tab or `gh workflow run`.

on:
    workflow_dispatch:
    push:
        branches: [master]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write # GITHUB_TOKEN may publish to the org's packages
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.tool-versions'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            # The packages publish their built `dist`, so build it first.
            - name: Build component packages
              run: pnpm package

            - name: Publish to GitHub Packages
              run: |
                  echo "@wimwian-org:registry=https://npm.pkg.github.com" > ~/.npmrc
                  echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
                  pnpm -r publish --no-git-checks
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
